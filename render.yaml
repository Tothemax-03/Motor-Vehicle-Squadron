services:
  - type: web
    runtime: node
    name: mvsms-backend
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: SESSION_SECRET
        generateValue: true
      - key: SESSION_COOKIE_SAME_SITE
        value: none
      - key: SESSION_COOKIE_SECURE
        value: true
      - key: FRONTEND_ORIGIN
        fromService:
          type: web
          name: mvsms-frontend
          envVarKey: RENDER_EXTERNAL_URL
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        value: 3306
      - key: DB_USER
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: DB_NAME
        sync: false

  - type: web
    runtime: static
    name: mvsms-frontend
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_API_BASE_URL
        fromService:
          type: web
          name: mvsms-backend
          envVarKey: RENDER_EXTERNAL_URL
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
